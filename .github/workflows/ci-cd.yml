name: CI/CD Pipeline

# WHEN should this pipeline run?
on:
  push:
    branches:
      - main        # Runs every time you push to main branch
  pull_request:
    branches:
      - main        # Also runs on pull requests

jobs:

  # ───────────────────────────
  # JOB 1: BUILD
  # ───────────────────────────
  build:
    name: 🔧 Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Step 1 - Checkout code
        uses: actions/checkout@v3
        # Downloads YOUR code onto GitHub's cloud machine

      - name: 🐍 Step 2 - Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        # Installs Python on the cloud machine

      - name: 📦 Step 3 - Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
        # Saves packages so next run is FASTER
        # Like saving downloaded files so you don't re-download

      - name: ⚙️ Step 4 - Upgrade pip
        run: python -m pip install --upgrade pip
        # pip is Python's package installer
        # Always upgrade it first = best practice

      - name: 📥 Step 5 - Install dependencies
        run: pip install -r requirements.txt
        # Installs Flask and everything in requirements.txt

      - name: ✅ Step 6 - Verify installation
        run: |
          python --version
          pip list
          python -c "import flask; print('Flask version:', flask.__version__)"
        # Confirms everything installed correctly
        # Like a "sanity check" before moving on

  # ───────────────────────────
  # JOB 2: TEST
  # ───────────────────────────
  test:
    name: 🧪 Test Stage
    runs-on: ubuntu-latest
    needs: build        # Only runs if build passes!

    steps:
      - name: ⬇️ Step 1 - Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Step 2 - Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Step 3 - Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 📥 Step 4 - Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Step 5 - Run all tests
        run: |
          pytest test_app.py -v --tb=short
        # -v means verbose (shows each test name)
        # --tb=short means show short error if test fails

      - name: 📊 Step 6 - Show test summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All tests passed!"
          echo "✅ App is safe to deploy!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ───────────────────────────
  # JOB 3: DEPLOY
  # ───────────────────────────
  deploy:
    name: 🚀 Deploy Stage
    runs-on: ubuntu-latest
    needs: test       # Wait for tests to pass first!

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy (simulation)
        run: |
          echo "✅ All tests passed!"
          echo "🚀 Deploying application to cloud..."
          echo "🌍 App is now LIVE!"
        # This is a dummy deploy for now
        # In Step 6, we'll connect real deployment