name: CI/CD Pipeline

# WHEN should this pipeline run?
on:
  push:
    branches:
      - main        # Runs every time you push to main branch
  pull_request:
    branches:
      - main        # Also runs on pull requests

jobs:

  # ───────────────────────────
  # JOB 1: BUILD
  # ───────────────────────────
  build:
    name: 🔧 Build Stage
    runs-on: ubuntu-latest     # GitHub gives us a free Linux machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        # Downloads your code onto the GitHub machine

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        # Installs Python on the machine

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        # Installs Flask and other packages from requirements.txt

  # ───────────────────────────
  # JOB 2: TEST
  # ───────────────────────────
  test:
    name: 🧪 Test Stage
    runs-on: ubuntu-latest
    needs: build      # Wait for build to pass first!

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest test_app.py -v
        # Runs your test file (we'll create this next)

  # ───────────────────────────
  # JOB 3: DEPLOY
  # ───────────────────────────
  deploy:
    name: 🚀 Deploy Stage
    runs-on: ubuntu-latest
    needs: test       # Wait for tests to pass first!

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy (simulation)
        run: |
          echo "✅ All tests passed!"
          echo "🚀 Deploying application to cloud..."
          echo "🌍 App is now LIVE!"
        # This is a dummy deploy for now
        # In Step 6, we'll connect real deployment